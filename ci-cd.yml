name: Product Service CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/product-service/**'
      - '.github/workflows/product-service.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/product-service/**'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: cloudmart/product-service
  SERVICE_NAME: product-service

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: services/product-service/package-lock.json

    - name: Install dependencies
      working-directory: services/product-service
      run: npm ci

    - name: Run linter
      working-directory: services/product-service
      run: npm run lint

    - name: Run tests
      working-directory: services/product-service
      run: npm test

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: services/product-service/coverage/lcov.info
        flags: product-service

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: 'services/product-service'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run npm audit
      working-directory: services/product-service
      run: npm audit --audit-level=moderate

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: services/product-service
        file: services/product-service/docker/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64

    - name: Scan Docker image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        format: 'sarif'
        output: 'trivy-image-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-image-results.sarif'

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: https://dev.cloudmart.example.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name cloudmart-dev-eks --region ${{ env.AWS_REGION }}

    - name: Deploy to Kubernetes
      run: |
        export ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}
        export IMAGE_TAG=${{ github.sha }}
        envsubst < infrastructure/kubernetes/deployments/product-service.yaml | kubectl apply -f -

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/${{ env.SERVICE_NAME }} -n cloudmart --timeout=5m

    - name: Run smoke tests
      run: |
        SERVICE_URL=$(kubectl get svc ${{ env.SERVICE_NAME }} -n cloudmart -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        curl -f http://${SERVICE_URL}/health || exit 1

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.cloudmart.example.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name cloudmart-staging-eks --region ${{ env.AWS_REGION }}

    - name: Deploy to Kubernetes
      run: |
        export ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}
        export IMAGE_TAG=${{ github.sha }}
        envsubst < infrastructure/kubernetes/deployments/product-service.yaml | kubectl apply -f -

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/${{ env.SERVICE_NAME }} -n cloudmart --timeout=5m

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://cloudmart.example.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name cloudmart-prod-eks --region ${{ env.AWS_REGION }}

    - name: Deploy to Kubernetes (Blue-Green)
      run: |
        export ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}
        export IMAGE_TAG=${{ github.sha }}
        envsubst < infrastructure/kubernetes/deployments/product-service.yaml | kubectl apply -f -

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/${{ env.SERVICE_NAME }} -n cloudmart --timeout=10m

    - name: Run smoke tests
      run: |
        SERVICE_URL=$(kubectl get svc ${{ env.SERVICE_NAME }} -n cloudmart -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        curl -f http://${SERVICE_URL}/health || exit 1
        curl -f http://${SERVICE_URL}/api/products?limit=1 || exit 1

    - name: Notify deployment
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        text: 'Production deployment of ${{ env.SERVICE_NAME }}'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
